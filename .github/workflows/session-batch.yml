name: Session Batch

on:
  workflow_dispatch:
    inputs:
      session:
        description: 'セッション'
        required: true
        default: 'close'
        type: choice
        options:
          - pre-morning
          - morning
          - pre-afternoon
          - afternoon
          - close
          - post-close
      notify:
        description: 'Push通知を送信する'
        required: false
        type: boolean
        default: true

# ──────────────────────────────────────────────
# セッション別の実行内容:
#
#   pre-morning (08:00):   news(JP+US) → trends → navigator(morning)
#   morning (09:10):       分析ジョブ群
#   pre-afternoon (11:40): news(JP) + prices → trends + navigator(pre-afternoon) + 分析ジョブ群
#   afternoon (12:40):     分析ジョブ群
#   close (15:40):         prices → trends → 分析 + gainers + snapshots
#   post-close (17:00):    navigator(evening)
# ──────────────────────────────────────────────

jobs:
  # ── データ取得 ──

  fetch-news:
    if: inputs.session == 'pre-morning' || inputs.session == 'pre-afternoon'
    uses: ./.github/workflows/session-fetch-news.yml
    with:
      market: ${{ inputs.session == 'pre-morning' && 'both' || 'jp' }}
    secrets: inherit

  fetch-stock-prices:
    if: inputs.session == 'pre-afternoon' || inputs.session == 'close'
    uses: ./.github/workflows/session-fetch-stock-prices.yml
    secrets: inherit

  # ── セクタートレンド計算 ──

  calculate-sector-trends:
    needs: [fetch-news, fetch-stock-prices]
    if: "!failure() && !cancelled() && (inputs.session == 'pre-morning' || inputs.session == 'pre-afternoon' || inputs.session == 'close')"
    uses: ./.github/workflows/session-calculate-sector-trends.yml
    secrets: inherit

  # ── 分析ジョブ群（並列） ──

  purchase-recommendations:
    needs: [fetch-news, calculate-sector-trends]
    if: "!failure() && !cancelled() && inputs.session != 'pre-morning' && inputs.session != 'post-close'"
    uses: ./.github/workflows/session-purchase-recommendations.yml
    secrets: inherit

  portfolio-analysis:
    needs: [fetch-news, calculate-sector-trends]
    if: "!failure() && !cancelled() && inputs.session != 'pre-morning' && inputs.session != 'post-close'"
    uses: ./.github/workflows/session-portfolio-analysis.yml
    secrets: inherit

  personal-recommendations:
    needs: [fetch-news, calculate-sector-trends]
    if: "!failure() && !cancelled() && inputs.session != 'pre-morning' && inputs.session != 'post-close'"
    uses: ./.github/workflows/session-personal-recommendations.yml
    with:
      session: ${{ inputs.session == 'morning' && 'morning' || inputs.session == 'close' && 'evening' || 'afternoon' }}
    secrets: inherit

  gainers-losers:
    needs: calculate-sector-trends
    if: "!failure() && !cancelled() && inputs.session == 'close'"
    uses: ./.github/workflows/session-gainers-losers.yml
    secrets: inherit

  portfolio-snapshots:
    needs: calculate-sector-trends
    if: "!failure() && !cancelled() && inputs.session == 'close'"
    uses: ./.github/workflows/session-portfolio-snapshots.yml
    secrets: inherit

  # ── マーケットナビゲーター ──

  daily-market-navigator:
    needs: [fetch-news, calculate-sector-trends]
    if: "!failure() && !cancelled() && (inputs.session == 'pre-morning' || inputs.session == 'pre-afternoon' || inputs.session == 'post-close')"
    uses: ./.github/workflows/session-daily-market-navigator.yml
    with:
      session: ${{ inputs.session == 'pre-morning' && 'morning' || inputs.session == 'pre-afternoon' && 'pre-afternoon' || 'evening' }}
    secrets: inherit

  # ── 通知 ──

  notify:
    needs: [purchase-recommendations, portfolio-analysis, personal-recommendations, gainers-losers, portfolio-snapshots, daily-market-navigator]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Send push notification
        if: (needs.purchase-recommendations.result == 'success' || needs.portfolio-analysis.result == 'success') && (github.event_name != 'workflow_dispatch' || inputs.notify)
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          python scripts/github-actions/send_push_notification.py \
            --title "今日の株価分析が完了しました" \
            --body "ポートフォリオ分析と購入レコメンドを更新しました" \
            --url "/my-stocks"

      - name: Notify Slack on success
        if: "!contains(needs.*.result, 'failure')"
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "✅ セッション処理に成功しました (${{ inputs.session }})"
          SLACK_MESSAGE: "セッション処理が完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Stock Buddy"

      - name: Notify Slack on failure
        if: contains(needs.*.result, 'failure')
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ セッション処理に失敗しました (${{ inputs.session }})"
          SLACK_MESSAGE: "詳細はGitHub Actionsログを確認してください"
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
